apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mi-app-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/xlen911/mi-app-infra.git'  # Reemplaza con tu usuario
    targetRevision: main
    path: helm/mi-app
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true