apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: mi-app-release-workflow
  namespace: argo
spec:
  entrypoint: mi-app-release
  arguments:
    parameters:
      - name: image_tag
        value: "latest"
      - name: target_environment
        value: "dev"
      - name: repo_url
        value: "https://github.com/1103461933/mi-app-infra.git"

  templates:
    - name: mi-app-release
      steps:
        - - name: validate
            template: validate-and-prepare
        - - name: update-and-push
            template: update-and-push-manifests
            arguments:
              parameters:
                - name: image_tag
                  value: "{{ workflow.parameters.image_tag }}"
                - name: target_environment
                  value: "{{ workflow.parameters.target_environment }}"
        - - name: sync
            template: trigger-argocd-sync

    - name: validate-and-prepare
      container:
        image: alpine:latest
        command: [sh, -c]
        args: ["echo Preparando release..."]

    - name: update-and-push-manifests
      inputs:
        parameters:
          - name: image_tag
          - name: target_environment
      container:
        image: alpine/git:latest
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef: { name: github-credentials, key: GITHUB_TOKEN }
          - name: GITHUB_USER
            valueFrom:
              secretKeyRef: { name: github-credentials, key: GITHUB_USER }
        command: [sh, -c]
        args:
          - |
            set -e
            git clone https://x-access-token:${GITHUB_TOKEN}@github.com/1103461933/mi-app-infra.git /tmp/repo
            cd /tmp/repo
            git config user.email "argo-workflows@mi-app.com"
            git config user.name "Argo Workflows"
            
            # Actualizamos el tag en el archivo
            sed -i "s|tag: .*|tag: {{ inputs.parameters.image_tag }}|g" overlays/{{ inputs.parameters.target_environment }}/patch-values.yaml
            
            git add .
            if ! git diff --cached --quiet; then
              git commit -m "Release: {{ inputs.parameters.image_tag }} [skip ci]"
              git push origin main
              echo "Push exitoso a GitHub."
            else
              echo "No hay cambios detectados en el tag."
            fi
            git rev-parse HEAD > /tmp/commit_hash.txt
      outputs:
        parameters:
          - name: commit_hash
            valueFrom: { path: /tmp/commit_hash.txt }

    - name: trigger-argocd-sync
      container:
        image: bitnami/kubectl:latest
        command: [sh, -c]
        args:
          - |
            set -e
            # USAMOS EL NOMBRE REAL: argo-workflows
            echo "Refrescando aplicación en Argo CD: argo-workflows"
            kubectl patch application argo-workflows -n argocd --type=merge -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}'
            echo "Refresh completado."