apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: mi-app-release-workflow
  namespace: argo
spec:
  entrypoint: mi-app-release
  arguments:
    parameters:
      - name: image_tag
        value: "latest"
      - name: target_environment
        value: "dev"
      - name: repo_url
        value: "https://github.com/1103461933/mi-app-infra.git"
      - name: app_name
        value: "mi-app"

  templates:
    - name: mi-app-release
      steps:
        - - name: validate-and-prepare
            template: validate-and-prepare
        - - name: update-and-push
            template: update-and-push-manifests
            arguments:
              parameters:
                - name: image_tag
                  value: "{{ workflow.parameters.image_tag }}"
                - name: target_environment
                  value: "{{ workflow.parameters.target_environment }}"
        - - name: trigger-argocd-sync
            template: trigger-argocd-sync
            arguments:
              parameters:
                - name: target_environment
                  value: "{{ workflow.parameters.target_environment }}"

    - name: validate-and-prepare
      container:
        image: alpine:latest
        command: [sh, -c]
        args:
          - |
            set -e
            echo "Validating release for image tag: {{ workflow.parameters.image_tag }}"
            echo "Target environment: {{ workflow.parameters.target_environment }}"
            echo "Repo: {{ workflow.parameters.repo_url }}"

    - name: update-and-push-manifests
      inputs:
        parameters:
          - name: image_tag
          - name: target_environment
      container:
        image: alpine/git:latest
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-credentials
                key: GITHUB_TOKEN
          - name: GITHUB_USER
            valueFrom:
              secretKeyRef:
                name: github-credentials
                key: GITHUB_USER
        command: [sh, -c]
        args:
          - |
            set -e
            echo "Clonando repositorio..."
            # Usamos x-access-token para evitar el error 403
            git clone https://x-access-token:${GITHUB_TOKEN}@github.com/1103461933/mi-app-infra.git /tmp/repo
            cd /tmp/repo
            
            git config user.email "argo-workflows@mi-app.com"
            git config user.name "Argo Workflows"
            
            echo "Actualizando etiqueta de imagen a: {{ inputs.parameters.image_tag }}"
            # SED para actualizar la etiqueta en el archivo correspondiente
            sed -i "s|tag: .*|tag: {{ inputs.parameters.image_tag }}|g" overlays/{{ inputs.parameters.target_environment }}/patch-values.yaml
            
            git add .
            
            # Solo hacer commit si hay cambios reales
            if ! git diff --cached --quiet; then
              git commit -m "Release: {{ inputs.parameters.image_tag }} en {{ inputs.parameters.target_environment }} [skip ci]"
              git push origin main
              echo "Push completado con éxito."
            else
              echo "No se detectaron cambios en los archivos."
            fi
            
            # Guardar el hash del commit para el output
            git rev-parse HEAD > /tmp/commit_hash.txt
      outputs:
        parameters:
          - name: commit_hash
            valueFrom:
              path: /tmp/commit_hash.txt

    - name: trigger-argocd-sync
      inputs:
        parameters:
          - name: target_environment
      container:
        image: bitnami/kubectl:latest
        command: [sh, -c]
        args:
          - |
            set -e
            echo "Avisando a Argo CD para refrescar la aplicación: mi-app-{{ inputs.parameters.target_environment }}"
            # Parcheamos la aplicación en el namespace 'argocd'
            kubectl patch application mi-app-{{ inputs.parameters.target_environment }} -n argocd --type=merge -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}'
            echo "Refresh enviado exitosamente."