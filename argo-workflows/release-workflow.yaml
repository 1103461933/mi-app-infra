apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: mi-app-release-workflow
  namespace: argo
spec:
  entrypoint: mi-app-release
  arguments:
    parameters:
      - name: image_tag
        value: "latest"
      - name: target_environment
        value: "dev"
      - name: repo_url
        value: "https://github.com/1103461933/mi-app-infra.git"
      - name: app_name
        value: "mi-app"
  templates:
    - name: mi-app-release
      steps:
        - - name: validate-and-prepare
            template: validate-and-prepare
        - - name: update-manifests
            template: update-manifests
            arguments:
              parameters:
                - name: image_tag
                  value: "{{ workflow.parameters.image_tag }}"
                - name: target_environment
                  value: "{{ workflow.parameters.target_environment }}"
        - - name: commit-and-push
            template: commit-and-push
            arguments:
              parameters:
                - name: image_tag
                  value: "{{ workflow.parameters.image_tag }}"
                - name: target_environment
                  value: "{{ workflow.parameters.target_environment }}"
        - - name: trigger-argocd-sync
            template: trigger-argocd-sync
            arguments:
              parameters:
                - name: target_environment
                  value: "{{ workflow.parameters.target_environment }}"

    - name: validate-and-prepare
      container:
        image: alpine:latest
        command: [sh, -c]
        args:
          - |
            echo "Validating release for image tag: {{ workflow.parameters.image_tag }}"
            echo "Target environment: {{ workflow.parameters.target_environment }}"
            echo "Preparing to update manifests in repo: {{ workflow.parameters.repo_url }}"

    - name: update-manifests
      inputs:
        parameters:
          - name: image_tag
          - name: target_environment
      container:
        image: alpine/git:latest
        command: [sh, -c]
        args:
          - |
            echo "Cloning repository..."
            git clone {{ workflow.parameters.repo_url }} /tmp/repo
            cd /tmp/repo
            git checkout main
            
            echo "Updating image tag to {{ inputs.parameters.image_tag }}..."
            sed -i "s|tag: .*|tag: {{ inputs.parameters.image_tag }}|g" overlays/{{ inputs.parameters.target_environment }}/patch-values.yaml
            
            echo "true" > changes_made.txt
            echo "Updated image tag to {{ inputs.parameters.image_tag }} in overlays/{{ inputs.parameters.target_environment }}/patch-values.yaml"
      outputs:
        parameters:
          - name: changes_made
            valueFrom:
              path: /tmp/repo/changes_made.txt

    - name: commit-and-push
      inputs:
        parameters:
          - name: image_tag
          - name: target_environment
      container:
        image: alpine/git:latest
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-credentials
                key: GITHUB_TOKEN
          - name: GITHUB_USER
            valueFrom:
              secretKeyRef:
                name: github-credentials
                key: GITHUB_USER
        command: [sh, -c]
        args:
          - |
            echo "Cloning repository with token..."
            git clone https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/1103461933/mi-app-infra.git /tmp/repo
            cd /tmp/repo
            git config user.email "argo-workflows@mi-app.com"
            git config user.name "Argo Workflows"
            
            echo "Committing changes..."
            git add overlays/{{ inputs.parameters.target_environment }}/patch-values.yaml
            git commit -m "Release: Update {{ inputs.parameters.target_environment }} image tag to {{ inputs.parameters.image_tag }} [skip ci]"
            
            echo "Pushing changes..."
            git push origin main
            
            COMMIT_HASH=$(git rev-parse HEAD)
            echo "Committed and pushed changes for {{ inputs.parameters.target_environment }} (Commit: $COMMIT_HASH)"
            echo $COMMIT_HASH > commit_hash.txt
      outputs:
        parameters:
          - name: commit_hash
            valueFrom:
              path: /tmp/repo/commit_hash.txt

    - name: trigger-argocd-sync
      inputs:
        parameters:
          - name: target_environment
      container:
        image: bitnami/kubectl:latest
        command: [sh, -c]
        args:
          - |
            echo "Triggering Argo CD refresh for: mi-app-{{ inputs.parameters.target_environment }}"
            kubectl patch application mi-app-{{ inputs.parameters.target_environment }} -n argocd --type=merge -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}'
            echo "Argo CD refresh triggered for mi-app-{{ inputs.parameters.target_environment }}"