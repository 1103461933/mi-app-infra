apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: mi-app-release-workflow
  namespace: argo
spec:
  entrypoint: mi-app-release
  arguments:
    parameters:
      - name: image_tag
        value: "latest"
      - name: target_environment
        value: "dev"
      - name: repo_url
        value: "https://github.com/1103461933/mi-app-infra.git"
      - name: app_name
        value: "mi-app"
  templates:
    - name: mi-app-release
      steps:
        - - name: validate-and-prepare
            template: validate-and-prepare
        - - name: update-manifests
            template: update-manifests
            arguments:
              parameters:
                - name: image_tag
                  value: "{{ workflow.parameters.image_tag }}"
                - name: target_environment
                  value: "{{ workflow.parameters.target_environment }}"
        - - name: commit-and-push
            template: commit-and-push
            arguments:
              parameters:
                - name: image_tag
                  value: "{{ workflow.parameters.image_tag }}"
                - name: target_environment
                  value: "{{ workflow.parameters.target_environment }}"
        - - name: trigger-argocd-sync
            template: trigger-argocd-sync
            arguments:
              parameters:
                - name: target_environment
                  value: "{{ workflow.parameters.target_environment }}"

    - name: validate-and-prepare
      container:
        image: alpine:latest
        command: [sh, -c]
        args:
          - |
            echo "Validating release for image tag: {{ workflow.parameters.image_tag }}"
            echo "Target environment: {{ workflow.parameters.target_environment }}"

    - name: update-manifests
      inputs:
        parameters:
          - name: image_tag
          - name: target_environment
      container:
        image: alpine/git:latest
        command: [sh, -c]
        args:
          - |
            set -e
            git clone {{ workflow.parameters.repo_url }} /tmp/repo
            cd /tmp/repo
            sed -i "s|tag: .*|tag: {{ inputs.parameters.image_tag }}|g" overlays/{{ inputs.parameters.target_environment }}/patch-values.yaml
            
            # Ruta absoluta para que Argo encuentre el archivo
            echo "true" > /tmp/repo/changes_made.txt
            echo "Manifests updated."
      outputs:
        parameters:
          - name: changes_made
            valueFrom:
              path: /tmp/repo/changes_made.txt

    - name: commit-and-push
      inputs:
        parameters:
          - name: image_tag
          - name: target_environment
      container:
        image: alpine/git:latest
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-credentials
                key: GITHUB_TOKEN
          - name: GITHUB_USER
            valueFrom:
              secretKeyRef:
                name: github-credentials
                key: GITHUB_USER
        command: [sh, -c]
        args:
          - |
            set -e
            git clone https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/1103461933/mi-app-infra.git /tmp/repo
            cd /tmp/repo
            git config user.email "argo-workflows@mi-app.com"
            git config user.name "Argo Workflows"
            
            # Volvemos a aplicar el sed por si acaso son pods distintos o volúmenes no compartidos
            sed -i "s|tag: .*|tag: {{ inputs.parameters.image_tag }}|g" overlays/{{ inputs.parameters.target_environment }}/patch-values.yaml
            
            git add .
            # Verificar si hay cambios antes de hacer commit (evita error de "nothing to commit")
            if git diff --quiet && git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Release: {{ inputs.parameters.image_tag }} [skip ci]"
              git push origin main
            fi
            
            # IMPORTANTE: Generar el archivo de salida en la ruta exacta
            git rev-parse HEAD > /tmp/repo/commit_hash.txt
      outputs:
        parameters:
          - name: commit_hash
            valueFrom:
              path: /tmp/repo/commit_hash.txt

    - name: trigger-argocd-sync
      inputs:
        parameters:
          - name: target_environment
      container:
        image: bitnami/kubectl:latest
        command: [sh, -c]
        args:
          - |
            set -e
            echo "Refreshing Argo CD app..."
            kubectl patch application mi-app-{{ inputs.parameters.target_environment }} -n argocd --type=merge -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}'