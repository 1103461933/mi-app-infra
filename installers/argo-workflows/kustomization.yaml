apiVersion: kustomize.config.k8s.io/v1beta1  # ✅ Esta es la versión correcta
kind: Kustomization
resources:
  - https://github.com/argoproj/argo-workflows/releases/download/v3.5.12/quick-start-minimal.yaml
patches:
  - path: patch-argo-server.yaml
    target:
      kind: Deployment
      name: argo-server